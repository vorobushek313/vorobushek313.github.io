<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Воспроизведение аудио по кнопке</title>
</head>
<body>
    <button onclick="playAudio()">Нажмите, чтобы послушать музыку</button>

    <audio id="audioPlayer" controls hidden></audio>

    <script>
        function playAudio() {
            var player = document.getElementById("audioPlayer");
            player.src = "https://www.dropbox.com/scl/fi/2eodze8gxl6gvveeb7m9s/Oxxxymiron-2.mp3?rlkey=5e2sea02kiq0m115e2dowkpoq&st=m19lj4x8&dl=0"; // замените на реальный URL-аудиофайла
            player.load();
            player.play();
        }
    </script>
</body>
</html>
