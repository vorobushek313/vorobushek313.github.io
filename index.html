<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sound on Link Click</title>
</head>
<body>
    <!-- Создаем ссылку -->
    <a href="#" id="githubLink">Перейти на GitHub</a>
    
    <!-- Скрытый элемент audio для проигрывания звука -->
    <audio id="soundFile" src="" preload="auto"></audio>

    <script>
        // Получаем элементы DOM
        const link = document.getElementById('githubLink');
        const sound = document.getElementById('soundFile');
        
        // Устанавливаем обработчик события клика
        link.addEventListener('click', function(event){
            event.preventDefault(); // Отменяем стандартный переход

            // Устанавливаем источник звукового файла
            sound.src = 'https://www.dropbox.com/scl/fi/2eodze8gxl6gvveeb7m9s/Oxxxymiron-2.mp3?rlkey=5e2sea02kiq0m115e2dowkpoq&st=q76fph3b&dl=0';
            
            // Начинаем воспроизводить звук
            sound.play().then(() => {
                // После завершения воспроизведения переходим по ссылке
                window.location.href = 'vorobushek313.github.io';
            }).catch(error => console.error("Ошибка воспроизведения:", error));
        });
    </script>
</body>
</html>
